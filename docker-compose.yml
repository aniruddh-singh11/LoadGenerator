services:
  target-server:
    build: ./target
    ports:
      - "3000:3000"
  
  load-generator:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - target-server
  
  chaos:
    build: ./chaos
    environment:
      - TARGET_URL=http://target-server:3000
    ports:
      - "4000:4000"
    depends_on:
      - target-server
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: loadgenerator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: